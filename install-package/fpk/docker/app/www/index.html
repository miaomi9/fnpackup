<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        .wrap{
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%,-50%);
            text-align: center;
        }
        .msg{
            color:#df5809;
        }
        .be-danger{ 
            color: red;
        }
        .to-danger{
            color: blue;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <p>
            <span>如果是HTTPS证书问题，</span>
            <a href="" target="_blank" class="be-danger">先去无视风险、</a>
            <a href="javascript:;" class="to-danger" onclick="window.location.reload()">然后已无视风险</a>
        </p>
        <p>
            <span>如果是穿透/反代问题，</span>
            <span><input type="text" placeholder="填写你的反代端口" id="port"></span>
            <span><button id="btn">确认</button></span>
        </p>
    </div>

    <script>
        const theme = {
            '10':'light',
            '20':'dark'
        }[localStorage.getItem('fnos-theme-mode')] || '';
        const cookies = document.cookie.split(' ').map(c=>c.split('=')).reduce((json,item)=>{
            json[item[0]] = item.filter((c,i)=>i>0).join('=');
            return json;
        },{});

        const jumpFn = (port,port1)=>{ 
            const hasFn = window.location.hostname.indexOf('fnos.net')>=0 || window.location.hostname.indexOf('5ddd.com')>=0;
            const hasApp = false;// window.location.hostname.indexOf('office.app')>=0;

            let newUrl = `${window.location.protocol}//${window.location.hostname}:${port}`;
            if(hasApp) newUrl = `${window.location.origin}`
            else if(hasFn) newUrl = `${window.location.protocol}//fnpackup-docker.${window.location.hostname}`
            newUrl = `${newUrl}/?t=${Date.now()}#/?fnos-theme=${theme}&fnos-token=${encodeURIComponent(cookies['fnos-token'])}`;
            document.querySelector('.be-danger').href = newUrl;

            if(hasApp || hasFn){
                window.location = newUrl;
            }else{
                fetch(newUrl).then(res=>{
                    window.location = newUrl;
                }).catch((err)=>{
                    console.log(err);
                });
            }
        }

        const href = window.location.href;
        const _href = localStorage.getItem('fnos-fnpackup-proxy-url');
        const _port = localStorage.getItem('fnos-fnpackup-proxy-port');
        if(href == _href && _port){
            jumpFn(_port);
        }else{
            jumpFn((window.location.protocol == 'http:' ? '1069' : '10699'));
        }
        document.querySelector('#btn').onclick = ()=>{
            const port = document.querySelector('#port').value;
            if(!port) {
                return;
            }
            localStorage.setItem('fnos-fnpackup-proxy-port',port);
            localStorage.setItem('fnos-fnpackup-proxy-url',window.location.href);
            jumpFn(port);
        }
        
    </script>
</body>
</html>
