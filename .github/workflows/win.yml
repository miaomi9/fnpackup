name: Windows
'on':
  workflow_dispatch: null
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - name: get current date
        id: date
        run: echo "::set-output name=today::$(date +'%Y-%m-%d')"
      - name: create release
        id: create_release
        uses: GongT/actions-recreate-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.ACTIONS_TOKEN }}
        with:
          tag_name: v1.1.3
          release_name: v1.1.3.${{ steps.date.outputs.today }}
          draft: false
          prerelease: false
          body: 1. 增加统一网关注册
      - name: setup node.js
        uses: actions/setup-node@v2
        with:
          node-version: '16'
      - name: setup dotnet
        uses: actions/setup-dotnet@v2
        env:
          GITHUB_TOKEN: ${{ secrets.ACTIONS_TOKEN }}
        with:
          dotnet-version: 8.0.x
      - name: publish projects
        run: ./shells/publish.bat
      - name: upload-win-x86
        id: upload--win-x86
        uses: actions/upload-release-asset@master
        env:
          GITHUB_TOKEN: ${{ secrets.ACTIONS_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./public/publish-zip/fnpackup-win-x86.zip
          asset_name: fnpackup-win-x86-v1.1.3.zip
          asset_content_type: application/zip
      - name: upload-win-x64
        id: upload--win-x64
        uses: actions/upload-release-asset@master
        env:
          GITHUB_TOKEN: ${{ secrets.ACTIONS_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./public/publish-zip/fnpackup-win-x64.zip
          asset_name: fnpackup-win-x64-v1.1.3.zip
          asset_content_type: application/zip
      - name: upload-win-arm64
        id: upload--win-arm64
        uses: actions/upload-release-asset@master
        env:
          GITHUB_TOKEN: ${{ secrets.ACTIONS_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./public/publish-zip/fnpackup-win-arm64.zip
          asset_name: fnpackup-win-arm64-v1.1.3.zip
          asset_content_type: application/zip
